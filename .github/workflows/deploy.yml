name: Deploy
 
on:
  push:
    branches: [main]
 
jobs:
  deploy:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via native SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # 1. Защита от пустых переменных
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_KEY" ]; then
            echo "Ошибка: Один из секретов (HOST, USER или KEY) пустой!"
            exit 1
          fi

          # 2. Создаем директорию для SSH ключей
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # 3. Записываем ключ через переменную окружения (это безопаснее всего)
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 4. Сканируем хост (выведем лог, чтобы понять, отвечает ли сеть)
          echo "Проверяем доступность хоста..."
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          
          # 5. Подключаемся и выполняем команды
          echo "Запускаем подключение..."
          ssh -vvv -i ~/.ssh/id_rsa -o ConnectTimeout=15 -o StrictHostKeyChecking=no "$SSH_USER"@"$SSH_HOST" << 'EOF'
            cd /var/www/myapp/backend
            git pull origin main
            cd /var/www/myapp
            docker compose up --build -d backend
          EOF
