name: Deploy
 
on:
  push:
    branches: [main]
 
jobs:
  deploy:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via native SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # 1. Создаем директорию для SSH ключей
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # 2. Записываем приватный ключ в файл и выставляем права
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 3. Добавляем сервер в список известных, чтобы не было интерактивного запроса
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          
          # 4. Подключаемся и выполняем команды (флаг -vvv включит максимальный дебаг)
          ssh -vvv -i ~/.ssh/id_rsa -o ConnectTimeout=15 "$SSH_USER"@"$SSH_HOST" << 'EOF'
            cd /var/www/myapp/backend
            git pull origin main
            cd /var/www/myapp
            docker compose up --build -d backend
          EOF
